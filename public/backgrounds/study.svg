<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="swall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9e1d4"/>
      <stop offset="1" stop-color="#cfc3ad"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#swall)"/>
  <!-- floor -->
  <rect y="520" width="1280" height="200" fill="#b79a72"/>
  <rect y="520" width="1280" height="14" fill="#9c8059"/>
  <!-- window with warm light -->
  <g>
    <rect x="120" y="120" width="320" height="320" rx="10" fill="#a7c4d6"/>
    <rect x="120" y="120" width="320" height="320" rx="10" fill="none" stroke="#7d6a4f" stroke-width="14"/>
    <line x1="280" y1="120" x2="280" y2="440" stroke="#7d6a4f" stroke-width="10"/>
    <line x1="120" y1="280" x2="440" y2="280" stroke="#7d6a4f" stroke-width="10"/>
    <rect x="134" y="134" width="146" height="146" fill="#c2dcea" opacity="0.7"/>
    <rect x="290" y="134" width="146" height="146" fill="#bcd6e6" opacity="0.7"/>
  </g>
  <!-- potted plant -->
  <g transform="translate(900,300)">
    <rect x="40" y="180" width="120" height="120" rx="10" fill="#9c6b43"/>
    <path d="M100 180 C60 120 40 60 90 30 C110 70 110 130 100 180 Z" fill="#4e8b53"/>
    <path d="M100 180 C140 120 160 60 110 30 C90 70 90 130 100 180 Z" fill="#5fa063"/>
    <path d="M100 180 C100 110 100 50 100 20 C120 70 120 140 100 180 Z" fill="#3f7647"/>
  </g>
  <!-- desk lamp glow -->
  <circle cx="640" cy="300" r="240" fill="#fff3d6" opacity="0.18"/>
  <rect width="1280" height="720" fill="#000" opacity="0.06"/>
</svg>
